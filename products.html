<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products — Artists' Reverie</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root { --cream:#f5f0e8; --ink:#1a1410; --gold:#c9a84c; --muted:#7a6e60; --blush:#e8ddd0; }
    body { background:var(--cream); color:var(--ink); font-family:'Jost',sans-serif; }

    nav {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; justify-content:space-between; align-items:center;
      padding:1.4rem 3rem;
      background:rgba(245,240,232,0.9); backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(201,168,76,0.2);
    }
    .nav-brand { font-family:'Cinzel',serif; font-size:1rem; letter-spacing:0.2em; color:var(--gold); text-decoration:none; }
    .nav-links { display:flex; gap:2.5rem; list-style:none; }
    .nav-links a { font-weight:300; font-size:0.85rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--ink); text-decoration:none; transition:color 0.3s; }
    .nav-links a:hover, .nav-links a.active { color:var(--gold); }
    .cart-icon { color:var(--ink); text-decoration:none; font-size:1.1rem; position:relative; transition:color 0.3s; }
    .cart-icon:hover { color:var(--gold); }
    .cart-count { position:absolute; top:-8px; right:-10px; background:var(--gold); color:white; border-radius:50%; width:18px; height:18px; font-size:0.65rem; display:flex; align-items:center; justify-content:center; font-weight:600; }

    .page-header { padding:10rem 3rem 4rem; text-align:center; border-bottom:1px solid rgba(201,168,76,0.2); }
    .page-header .label { font-size:0.75rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:1rem; }
    .page-header h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2.5rem,5vw,4rem); font-weight:300; font-style:italic; }

    .filter-bar {
      max-width:1200px; margin:0 auto; padding:2.5rem 2rem 0;
      display:flex; gap:1rem; flex-wrap:wrap;
    }
    .filter-btn {
      padding:0.5rem 1.4rem; border:1px solid rgba(201,168,76,0.4);
      background:transparent; color:var(--muted);
      font-family:'Jost',sans-serif; font-size:0.78rem;
      letter-spacing:0.12em; text-transform:uppercase; cursor:pointer;
      transition:all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active { border-color:var(--gold); color:var(--ink); background:rgba(201,168,76,0.08); }

    .products-section { max-width:1200px; margin:0 auto; padding:2.5rem 2rem 6rem; }
    .products-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:2rem; }

    .product-card {
      background:white; border:1px solid rgba(201,168,76,0.15);
      overflow:hidden; transition:transform 0.3s, box-shadow 0.3s;
    }
    .product-card:hover { transform:translateY(-6px); box-shadow:0 20px 40px rgba(26,20,16,0.1); }

    .product-img-placeholder {
      width:100%; aspect-ratio:4/5;
      display:flex; align-items:center; justify-content:center;
      position:relative; overflow:hidden;
    }
    /* Updated: img fills the placeholder area */
    .product-img-placeholder img {
      width:100%; height:100%; object-fit:cover;
    }

    .badge {
      position:absolute; top:1rem; left:1rem;
      background:var(--gold); color:white;
      font-size:0.65rem; letter-spacing:0.15em; text-transform:uppercase;
      padding:0.25rem 0.6rem;
    }

    .product-info { padding:1.2rem 1.4rem 1.4rem; }
    .product-sub { font-size:0.72rem; letter-spacing:0.12em; color:var(--muted); text-transform:uppercase; margin-bottom:0.3rem; }
    .product-name { font-family:'Cormorant Garamond',serif; font-size:1.15rem; margin-bottom:0.6rem; }
    .product-desc { font-size:0.82rem; color:var(--muted); line-height:1.5; margin-bottom:1rem; }

    .product-footer { display:flex; justify-content:space-between; align-items:center; }
    .product-price { font-family:'Cinzel',serif; font-size:0.92rem; color:var(--gold); }

    .add-btn {
      padding:0.45rem 1rem; border:1px solid var(--gold);
      background:transparent; color:var(--ink);
      font-family:'Jost',sans-serif; font-size:0.72rem;
      letter-spacing:0.12em; text-transform:uppercase;
      cursor:pointer; transition:all 0.25s;
    }
    .add-btn:hover { background:var(--gold); color:white; }
    .add-btn.added { background:var(--gold); color:white; }

    .toast {
      position:fixed; bottom:2rem; right:2rem;
      background:var(--ink); color:var(--cream);
      padding:0.9rem 1.8rem;
      font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1rem;
      transform:translateY(100px); opacity:0;
      transition:all 0.4s ease;
      z-index:999;
    }
    .toast.show { transform:translateY(0); opacity:1; }

    footer { background:var(--ink); color:var(--muted); text-align:center; padding:3rem; font-family:'Cormorant Garamond',serif; font-style:italic; }
    footer a { color:var(--gold); text-decoration:none; }

    @media(max-width:700px) { nav { padding:1.2rem 1.5rem; } }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">A·R</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="products.html" class="active">Products</a></li>
    </ul>
    <a href="cart.html" class="cart-icon">🛒<span class="cart-count" id="cartCount">0</span></a>
  </nav>

  <header class="page-header">
    <span class="label">Handpicked for creators</span>
    <h1>The Collection</h1>
  </header>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterProducts('all', this)">All</button>
    <button class="filter-btn" onclick="filterProducts('watercolor', this)">Watercolor</button>
    <button class="filter-btn" onclick="filterProducts('drawing', this)">Drawing</button>
    <button class="filter-btn" onclick="filterProducts('oil', this)">Oil & Acrylic</button>
    <button class="filter-btn" onclick="filterProducts('paper', this)">Paper & Books</button>
  </div>

  <section class="products-section">
    <div class="products-grid" id="productsGrid"></div>
  </section>

  <div class="toast" id="toast">Added to cart ✦</div>

  <footer>
    <p>© 2025 <a href="index.html">Artists' Reverie</a> — crafted with intention</p>
  </footer>

  <script>
    const PRODUCTS = [
      { id:1, name:"Watercolor Palette", sub:"Watercolor", category:"watercolor", price:48, desc:"36 colors to paint off your dreams", color:"#dce8f0", badge:"Bestseller",
        img:"https://artfriendonline.com/Content/ProductImages/Gallery/2824183906465_1.jpg"},
      { id:2, name:"Acrylic Paint", sub:"Oil & Acrylic", category:"oil", price:24, desc:"Make the best of your canvas with these paints", color:"#f0eadc",
        img:"https://artfriendonline.com/Content/ProductImages/Gallery/DR_SIM_AS_1.jpg" },
      { id:3, name:"Set of Paintbrushes", sub:"Oil & Acrylic", category:"oil", price:36, desc:"A set of one.", color:"#e8ddc8", badge:"New",
        img:"https://artfriendonline.com/Content/ProductImages/Gallery/PX-579-PC_1.jpg"  },
      { id:4, name:"Potentate Sketchbook", sub:"Paper & Books", category:"paper", price:18, desc:"A hundred and ten sheets awaits.", color:"#e0ddd8",
        img:"https://artfriendonline.com/Content/ProductImages/Gallery/DR_SB1750_1.jpg" },
    ];

    let activeFilter = 'all';

    function filterProducts(cat, btn) {
      activeFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts();
    }

    function renderProducts() {
      const grid = document.getElementById('productsGrid');
      const filtered = activeFilter === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === activeFilter);
      grid.innerHTML = filtered.map(p => `
        <div class="product-card" data-id="${p.id}">
          <div class="product-img-placeholder" style="background:${p.color};">
            <img src="${p.img}" alt="${p.name}">
            ${p.badge ? `<span class="badge">${p.badge}</span>` : ''}
          </div>
          <div class="product-info">
            <p class="product-sub">${p.sub}</p>
            <h3 class="product-name">${p.name}</h3>
            <p class="product-desc">${p.desc}</p>
            <div class="product-footer">
              <span class="product-price">$${p.price}.00</span>
              <button class="add-btn" onclick="addToCart(${p.id}, this)">Add to Cart</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function addToCart(id, btn) {
      const cart = JSON.parse(localStorage.getItem('ar_cart') || '[]');
      const product = PRODUCTS.find(p => p.id === id);
      const existing = cart.find(i => i.id === id);
      if (existing) { existing.qty++; } else { cart.push({ ...product, qty: 1 }); }
      localStorage.setItem('ar_cart', JSON.stringify(cart));
      document.getElementById('cartCount').textContent = cart.reduce((s,i) => s + i.qty, 0);
      btn.textContent = 'Added ✦';
      btn.classList.add('added');
      setTimeout(() => { btn.textContent = 'Add to Cart'; btn.classList.remove('added'); }, 1500);
      showToast(`"${product.name}" added to cart`);
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg + ' ✦';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    renderProducts();
    document.getElementById('cartCount').textContent =
      JSON.parse(localStorage.getItem('ar_cart') || '[]').reduce((s,i) => s + i.qty, 0);
  </script>
</body>
</html>
