<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Artists' Reverie</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cream: #f5f0e8;
      --ink: #1a1410;
      --gold: #c9a84c;
      --muted: #7a6e60;
      --blush: #e8ddd0;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.4rem 3rem;
      background: rgba(245,240,232,0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(201,168,76,0.2);
    }

    .nav-brand {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      text-decoration: none;
    }

    .nav-links {
      display: flex;
      gap: 2.5rem;
      list-style: none;
    }

    .nav-links a {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink);
      text-decoration: none;
      position: relative;
      transition: color 0.3s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.3s;
    }

    .nav-links a:hover { color: var(--gold); }
    .nav-links a:hover::after { width: 100%; }

    .cart-icon {
      position: relative;
      cursor: pointer;
      font-size: 1.1rem;
      color: var(--ink);
      text-decoration: none;
      transition: color 0.3s;
    }
    .cart-icon:hover { color: var(--gold); }
    .cart-count {
      position: absolute;
      top: -8px; right: -10px;
      background: var(--gold);
      color: white;
      border-radius: 50%;
      width: 18px; height: 18px;
      font-size: 0.65rem;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* decorative background blobs */
    .hero::before {
      content: '';
      position: absolute;
      top: 10%; left: 5%;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 10%; right: 5%;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .hero-eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }

    .hero-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.8rem, 7vw, 6rem);
      font-weight: 600;
      line-height: 1.1;
      letter-spacing: 0.05em;
      color: var(--ink);
    }

    .hero-title span {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: clamp(1.8rem, 4.5vw, 4rem);
      color: var(--gold);
      letter-spacing: 0.12em;
    }

    /* ── LOGO ── */
    .hero-logo {
      margin-top: 2.5rem;
    }

    .hero-logo img {
      width: 180px;
      height: 180px;
      object-fit: contain;
    }

    .hero-tagline {
      margin-top: 2rem;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .hero-cta {
      margin-top: 2.8rem;
      display: inline-block;
      padding: 0.85rem 3rem;
      border: 1px solid var(--gold);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }

    .hero-cta:hover {
      background: var(--gold);
      color: white;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--ink);
      color: var(--cream);
      text-align: center;
      padding: 3rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.95rem;
      color: var(--muted);
    }

    footer a { color: var(--gold); text-decoration: none; }

  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-brand">A·R</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="products.html">Products</a></li>
    </ul>
    <a href="cart.html" class="cart-icon">
      🛒
      <span class="cart-count" id="cartCount">0</span>
    </a>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <p class="hero-eyebrow">A curated art collective</p>

    <h1 class="hero-title">
      Artists' Reverie
      <span>where dreams take form</span>
    </h1>

    <!-- LOGO below the title -->
    <div class="hero-logo">
      <img src="littleprincelogo.png" alt="Artists' Reverie logo" />
    </div>

    <p class="hero-tagline"> What's essential is invisible to the eye</p>

    <a href="products.html" class="hero-cta">Explore the Collection</a>

  </section>

  <footer>
    <p>© 2025 <a href="index.html">Artists' Reverie</a> — crafted with intention</p>
  </footer>

  <script>
    // Keep cart count in sync across pages
    document.getElementById('cartCount').textContent =
      JSON.parse(localStorage.getItem('ar_cart') || '[]').length;
  </script>
</body>
</html>
