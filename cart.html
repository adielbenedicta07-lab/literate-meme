<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — Artists' Reverie</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=Jost:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root { --cream:#f5f0e8; --ink:#1a1410; --gold:#c9a84c; --muted:#7a6e60; --blush:#e8ddd0; }
    body { background:var(--cream); color:var(--ink); font-family:'Jost',sans-serif; }

    nav {
      position:fixed; top:0; left:0; right:0; z-index:100;
      display:flex; justify-content:space-between; align-items:center;
      padding:1.4rem 3rem;
      background:rgba(245,240,232,0.9); backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(201,168,76,0.2);
    }
    .nav-brand { font-family:'Cinzel',serif; font-size:1rem; letter-spacing:0.2em; color:var(--gold); text-decoration:none; }
    .nav-links { display:flex; gap:2.5rem; list-style:none; }
    .nav-links a { font-weight:300; font-size:0.85rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--ink); text-decoration:none; transition:color 0.3s; }
    .nav-links a:hover { color:var(--gold); }
    .cart-icon { color:var(--ink); text-decoration:none; font-size:1.1rem; position:relative; transition:color 0.3s; color:var(--gold); }
    .cart-count { position:absolute; top:-8px; right:-10px; background:var(--gold); color:white; border-radius:50%; width:18px; height:18px; font-size:0.65rem; display:flex; align-items:center; justify-content:center; font-weight:600; }

    .page-header { padding:10rem 3rem 4rem; text-align:center; border-bottom:1px solid rgba(201,168,76,0.2); }
    .page-header .label { font-size:0.75rem; letter-spacing:0.35em; text-transform:uppercase; color:var(--gold); display:block; margin-bottom:1rem; }
    .page-header h1 { font-family:'Cormorant Garamond',serif; font-size:clamp(2.5rem,5vw,4rem); font-weight:300; font-style:italic; }

    /* LAYOUT */
    .cart-wrap {
      max-width:1000px; margin:0 auto; padding:4rem 2rem 6rem;
      display:grid; grid-template-columns:1fr 320px; gap:3rem; align-start:start;
    }

    /* CART ITEMS */
    .cart-items { display:flex; flex-direction:column; gap:0; }

    .cart-row {
      display:grid; grid-template-columns:80px 1fr auto;
      gap:1.5rem; align-items:center;
      padding:1.5rem 0;
      border-bottom:1px solid rgba(201,168,76,0.15);
    }

    .cart-thumb {
      width:80px; height:80px;
      display:flex; align-items:center; justify-content:center;
      border:1px solid rgba(201,168,76,0.2);
    }
    .cart-thumb svg { width:40px; height:40px; }

    .cart-item-name { font-family:'Cormorant Garamond',serif; font-size:1.1rem; margin-bottom:0.2rem; }
    .cart-item-sub { font-size:0.75rem; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; }

    .cart-item-right { display:flex; flex-direction:column; align-items:flex-end; gap:0.8rem; }
    .item-price { font-family:'Cinzel',serif; font-size:0.9rem; color:var(--gold); }

    .qty-controls { display:flex; align-items:center; gap:0.5rem; }
    .qty-btn {
      width:28px; height:28px; border:1px solid rgba(201,168,76,0.4);
      background:transparent; cursor:pointer; font-size:1rem;
      color:var(--ink); transition:all 0.2s; display:flex; align-items:center; justify-content:center;
    }
    .qty-btn:hover { background:var(--gold); color:white; border-color:var(--gold); }
    .qty-num { font-size:0.9rem; min-width:24px; text-align:center; }

    .remove-btn { font-size:0.7rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); background:none; border:none; cursor:pointer; text-decoration:underline; transition:color 0.2s; }
    .remove-btn:hover { color:#b04040; }

    /* EMPTY STATE */
    .empty-cart { text-align:center; padding:4rem 2rem; }
    .empty-cart p { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.3rem; color:var(--muted); margin-bottom:2rem; }

    /* SUMMARY PANEL */
    .cart-summary {
      background:white; border:1px solid rgba(201,168,76,0.2);
      padding:2rem; position:sticky; top:6rem;
    }
    .summary-title { font-family:'Cinzel',serif; font-size:0.9rem; letter-spacing:0.1em; margin-bottom:1.5rem; color:var(--gold); }

    .summary-row { display:flex; justify-content:space-between; margin-bottom:0.8rem; font-size:0.88rem; color:var(--muted); }
    .summary-row.total { font-family:'Cinzel',serif; font-size:1rem; color:var(--ink); border-top:1px solid rgba(201,168,76,0.2); padding-top:1rem; margin-top:1rem; }

    .checkout-btn {
      width:100%; padding:0.95rem;
      background:var(--gold); color:white; border:none;
      font-family:'Jost',sans-serif; font-size:0.8rem;
      letter-spacing:0.2em; text-transform:uppercase;
      cursor:pointer; margin-top:1.5rem; transition:background 0.3s;
    }
    .checkout-btn:hover { background:#b8923c; }

    .continue-link { display:block; text-align:center; margin-top:1rem; font-size:0.78rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); text-decoration:none; transition:color 0.2s; }
    .continue-link:hover { color:var(--gold); }

    /* CONFIRMATION OVERLAY */
    .overlay {
      display:none; position:fixed; inset:0;
      background:rgba(26,20,16,0.6); z-index:999;
      align-items:center; justify-content:center;
    }
    .overlay.show { display:flex; }
    .confirm-box {
      background:var(--cream); padding:3rem; max-width:420px; width:90%; text-align:center;
      border:1px solid rgba(201,168,76,0.3);
      animation: fadeUp 0.4s ease;
    }
    .confirm-box .icon { font-size:2.5rem; margin-bottom:1.2rem; }
    .confirm-box h2 { font-family:'Cinzel',serif; font-size:1.1rem; letter-spacing:0.08em; margin-bottom:0.8rem; }
    .confirm-box p { font-family:'Cormorant Garamond',serif; font-style:italic; color:var(--muted); font-size:1.05rem; margin-bottom:2rem; }
    .confirm-box .btn { display:inline-block; padding:0.8rem 2.5rem; border:1px solid var(--gold); color:var(--ink); font-family:'Jost',sans-serif; font-size:0.78rem; letter-spacing:0.2em; text-transform:uppercase; text-decoration:none; transition:all 0.3s; cursor:pointer; background:transparent; }
    .confirm-box .btn:hover { background:var(--gold); color:white; }

    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    footer { background:var(--ink); color:var(--muted); text-align:center; padding:3rem; font-family:'Cormorant Garamond',serif; font-style:italic; }
    footer a { color:var(--gold); text-decoration:none; }

    @media(max-width:700px) {
      nav { padding:1.2rem 1.5rem; }
      .cart-wrap { grid-template-columns:1fr; }
      .cart-row { grid-template-columns:60px 1fr auto; gap:1rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-brand">A·R</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="products.html">Products</a></li>
    </ul>
    <a href="cart.html" class="cart-icon">🛒<span class="cart-count" id="cartCount">0</span></a>
  </nav>

  <header class="page-header">
    <span class="label">Your selections</span>
    <h1>Your Cart</h1>
  </header>

  <div class="cart-wrap">
    <div id="cartItems" class="cart-items"></div>

    <aside class="cart-summary" id="cartSummary">
      <h2 class="summary-title">Order Summary</h2>
      <div class="summary-row"><span>Subtotal</span><span id="subtotal">$0.00</span></div>
      <div class="summary-row"><span>Shipping</span><span id="shipping">—</span></div>
      <div class="summary-row total"><span>Total</span><span id="total">$0.00</span></div>
      <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
      <a href="products.html" class="continue-link">← Continue Shopping</a>
    </aside>
  </div>

  <!-- Checkout confirmation -->
  <div class="overlay" id="overlay">
    <div class="confirm-box">
      <div class="icon">✦</div>
      <h2>Order Placed!</h2>
      <p>Thank you for your purchase. Your art supplies are on their way to you, dear dreamer.</p>
      <button class="btn" onclick="clearOrder()">Back to Shop</button>
    </div>
  </div>

  <footer>
    <p>© 2025 <a href="index.html">Artists' Reverie</a> — crafted with intention</p>
  </footer>

  <script>
    // SVGs matching product IDs for the cart thumbnails
    const SVGS = {
      1:`<svg viewBox="0 0 70 70" fill="none"><ellipse cx="35" cy="35" rx="25" ry="18" stroke="#c9a84c" stroke-width="1.2"/><circle cx="22" cy="32" r="4" fill="#a8c4d0" opacity="0.6"/><circle cx="35" cy="28" r="4" fill="#d0a8b0" opacity="0.6"/><circle cx="48" cy="32" r="4" fill="#a8d0b8" opacity="0.6"/></svg>`,
      2:`<svg viewBox="0 0 70 70" fill="none"><rect x="18" y="12" width="34" height="46" rx="2" stroke="#c9a84c" stroke-width="1.2"/></svg>`,
      3:`<svg viewBox="0 0 70 70" fill="none"><line x1="28" y1="60" x2="28" y2="15" stroke="#c9a84c" stroke-width="1.5"/><line x1="35" y1="60" x2="35" y2="10" stroke="#c9a84c" stroke-width="1.5"/><line x1="42" y1="60" x2="42" y2="18" stroke="#c9a84c" stroke-width="1.5"/></svg>`,
      4:`<svg viewBox="0 0 70 70" fill="none"><line x1="20" y1="55" x2="50" y2="15" stroke="#c9a84c" stroke-width="1.5"/></svg>`,
      5:`<svg viewBox="0 0 70 70" fill="none"><rect x="14" y="14" width="42" height="42" stroke="#c9a84c" stroke-width="1.2"/></svg>`,
      6:`<svg viewBox="0 0 70 70" fill="none"><path d="M35 15 C35 15 20 35 20 47 A15 15 0 0 0 50 47 C50 35 35 15 35 15Z" stroke="#c9a84c" stroke-width="1.2" fill="rgba(201,168,76,0.15)"/></svg>`,
      7:`<svg viewBox="0 0 70 70" fill="none"><rect x="18" y="14" width="28" height="42" rx="1" stroke="#c9a84c" stroke-width="1.2"/></svg>`,
      8:`<svg viewBox="0 0 70 70" fill="none"><circle cx="35" cy="30" r="10" stroke="#c9a84c" stroke-width="1" fill="rgba(160,200,230,0.2)"/></svg>`,
    };

    function getCart() { return JSON.parse(localStorage.getItem('ar_cart') || '[]'); }
    function saveCart(cart) { localStorage.setItem('ar_cart', JSON.stringify(cart)); }

    function updateCount(cart) {
      document.getElementById('cartCount').textContent = cart.reduce((s,i) => s+i.qty, 0);
    }

    function render() {
      const cart = getCart();
      const itemsEl = document.getElementById('cartItems');
      updateCount(cart);

      if (cart.length === 0) {
        itemsEl.innerHTML = `
          <div class="empty-cart">
            <p>Your cart is empty — browse the collection and find your muse.</p>
            <a href="products.html" style="display:inline-block;padding:0.85rem 3rem;border:1px solid var(--gold);color:var(--ink);font-family:Jost,sans-serif;font-size:0.8rem;letter-spacing:0.25em;text-transform:uppercase;text-decoration:none;transition:background 0.3s,color 0.3s;" onmouseover="this.style.background='#c9a84c';this.style.color='white'" onmouseout="this.style.background='';this.style.color=''">
              Shop Now
            </a>
          </div>`;
        document.getElementById('subtotal').textContent = '$0.00';
        document.getElementById('shipping').textContent = '—';
        document.getElementById('total').textContent = '$0.00';
        return;
      }

      itemsEl.innerHTML = cart.map(item => `
        <div class="cart-row">
          <div class="cart-thumb" style="background:${item.color||'#e8ddd0'}">
            ${SVGS[item.id] || ''}
          </div>
          <div>
            <p class="cart-item-name">${item.name}</p>
            <p class="cart-item-sub">${item.sub}</p>
          </div>
          <div class="cart-item-right">
            <span class="item-price">$${(item.price * item.qty).toFixed(2)}</span>
            <div class="qty-controls">
              <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
              <span class="qty-num">${item.qty}</span>
              <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
            </div>
            <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
          </div>
        </div>
      `).join('');

      const subtotal = cart.reduce((s,i) => s + i.price * i.qty, 0);
      const shipping = subtotal > 60 ? 0 : 8;
      document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('shipping').textContent = shipping === 0 ? 'Free ✦' : `$${shipping.toFixed(2)}`;
      document.getElementById('total').textContent = `$${(subtotal + shipping).toFixed(2)}`;
    }

    function changeQty(id, delta) {
      let cart = getCart();
      const item = cart.find(i => i.id === id);
      if (!item) return;
      item.qty += delta;
      if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
      saveCart(cart);
      render();
    }

    function removeItem(id) {
      let cart = getCart().filter(i => i.id !== id);
      saveCart(cart);
      render();
    }

    function checkout() {
      document.getElementById('overlay').classList.add('show');
    }

    function clearOrder() {
      localStorage.removeItem('ar_cart');
      document.getElementById('overlay').classList.remove('show');
      window.location.href = 'products.html';
    }

    render();
  </script>
</body>
</html>
